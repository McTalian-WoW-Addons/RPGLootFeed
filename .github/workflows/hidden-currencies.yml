name: Update Hidden Currencies

on:
  workflow_dispatch:
  schedule:
    - cron: 0 14 * * 1 # Weekly on Monday at 2pm UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  hidden-currencies:
    runs-on: ubuntu-latest
    steps:
      - name: Clone project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync uv environment
        run: uv sync

      - name: Install playwright
        run: uv run playwright install

      - name: Check for hidden currencies
        run: make generate_hidden_currencies

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GH_PAT }}
          title: "chore: update hidden currencies list"
          body: |
            ## Requirements

            - [ ] Review any new Hidden Currencies
            - [ ] Verify currency display in-game

            ----------------------------------------------------
            _This PR was automatically created to update the hidden currencies list._
          commit-message: "chore: update hidden currencies list"
          branch: hidden-currencies
          delete-branch: true
