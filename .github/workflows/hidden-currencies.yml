name: Update Hidden Currencies

on:
  workflow_dispatch:
  schedule:
    - cron: 0 14 * * 1 # Weekly on Monday at 2pm UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  hidden-currencies:
    runs-on: ubuntu-latest
    steps:
      - name: Clone project
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Sync uv environment
        run: uv sync

      - name: Install playwright
        run: uv run playwright install

      - name: Check for hidden currencies
        run: make generate_hidden_currencies

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GH_PAT }}
          title: "chore: update hidden currencies list"
          body: |
            ## Requirements

            - [ ] Review any new Hidden Currencies
            - [ ] Verify currency display in-game

            ----------------------------------------------------
            _This PR was automatically created to update the hidden currencies list._
          commit-message: "chore: update hidden currencies list"
          branch: hidden-currencies
          delete-branch: true
