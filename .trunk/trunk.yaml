# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
    - id: wbt-configs
      ref: v0.1.2
      uri: https://github.com/McTalian-WoW-Addons/wow-addon-trunk-configs
tools:
  enabled:
    - uv@0.11.23
  definitions:
    - name: uv
      runtime: python
      package: uv
      shims: [uv]
      known_good_version: 0.10.9
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  ignore:
    - linters: [no-invalid-prints]
      paths:
        - "*_spec/**"
        - .scripts/**
        - RPGLootFeed/GameTesting/GameTestRunner.lua
  enabled:
    - no-invalid-prints
  definitions:
    - name: no-invalid-prints
      files: [lua]
      tools: [uv]
      commands:
        - name: lint
          output: sarif
          run: uv run --no-project .scripts/check_for_invalid_prints.py ${target}
          success_codes: [0, 1]
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
    - organize-translations
  definitions:
    - id: organize-translations
      triggers:
        - git_hooks: [pre-commit]

      run: uv run --project ../wow-build-tools/scripts/i18n ../wow-build-tools/scripts/i18n/organize_translations.py --locale-dir RPGLootFeed/locale
